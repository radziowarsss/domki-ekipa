[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Czysty, publiczny (bez logowania) link do porównania — przed SPA catch-all
[[redirects]]
  from = "/porownanie"
  to = "/porownanie.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
